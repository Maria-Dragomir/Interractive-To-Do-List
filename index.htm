<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive To-Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <div class="container">
        <div class="main-content">
            <h1 id="page-title">Interactive To-Do List</h1>
            <div class="widget">
                <h2>Note Something Down</h2>
                <input type="text" id="searchTerm" placeholder="Enter a task" />
                <button id="searchButton">Add Task</button>
            </div>
            <div class="widget">
                <h2>My Tasks</h2>
                <ul id="searches">
                </ul>
            </div>
            
        </div>
    </div>

</body>
<script src="./assets/js/script.js"></script>

</html>
